<section class="page">
  <!-- Header -->
  <div class="list-header">
    <div>
      <h1 class="page-title">Settings</h1>
      <p class="page-subtitle">Customize how GymBro works for you.</p>
    </div>
  </div>

  <!-- Preferences -->
  <div class="settings-group">
    <div class="setting-item">
      <div class="setting-label">
        <span class="setting-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9" />
            <polyline points="12 7 12 12 15 14" />
          </svg>
        </span>
        <div class="setting-text">
          <span>Track time per set</span>
          <p class="setting-hint">Adds a time (m:ss) field next to each set when logging a workout on the Weeks
            page.</p>
        </div>
      </div>
      <button class="theme-switch" [class.active]="showSetTime()" (click)="toggleSetTime()" [disabled]="saving()"
        [attr.aria-pressed]="showSetTime()" aria-label="Toggle time tracking per set">
        <span class="switch-knob"></span>
      </button>
    </div>
  </div>
</section>
