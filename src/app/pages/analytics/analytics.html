<section class="page">
  <div class="list-header">
    <div>
      <h1 class="page-title">Analytics</h1>
      <p class="page-subtitle">How your training and weight are trending.</p>
    </div>
    <!-- One filter row, scoping every card below it. -->
    <app-range-selector [(range)]="range" />
  </div>

  <div class="cards">
    <app-weight-burndown [range]="range()" (editGoal)="goalModalOpen.set(true)" />
    <app-muscle-progress [range]="range()" />
  </div>
</section>

<app-goal-form-modal [open]="goalModalOpen()" (close)="goalModalOpen.set(false)" />
