<div class="dashboard-page">
  <div class="dashboard-content">
    <!-- Welcome Section -->
    <div class="welcome-card glass-card">
      <div class="welcome-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="18" width="40" height="12" rx="3" fill="url(#gradD)" opacity="0.9"/>
          <rect x="10" y="12" width="6" height="24" rx="3" fill="url(#gradD)"/>
          <rect x="32" y="12" width="6" height="24" rx="3" fill="url(#gradD)"/>
          <rect x="1" y="16" width="6" height="16" rx="3" fill="url(#gradD)" opacity="0.7"/>
          <rect x="41" y="16" width="6" height="16" rx="3" fill="url(#gradD)" opacity="0.7"/>
          <defs>
            <linearGradient id="gradD" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:hsl(270, 80%, 55%)"/>
              <stop offset="100%" style="stop-color:hsl(290, 70%, 50%)"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="welcome-title">Welcome, {{ userName }}! 💪</h1>
      <p class="welcome-subtitle">
        You're all set! The workout tracker is coming soon.
      </p>
      <button class="btn btn-secondary mt-3" id="sign-out-btn" (click)="onSignOut()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign Out
      </button>
    </div>
  </div>
</div>
