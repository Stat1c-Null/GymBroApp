<div class="dashboard-page">
  <div class="dashboard-content">
    <!-- Welcome Section -->
    <div class="welcome-card glass-card">
      <div class="welcome-icon">
        <app-brand-logo [size]="48" />
      </div>
      <h1 class="welcome-title">Welcome, {{ authService.displayName() }}! 💪</h1>
      <p class="welcome-subtitle">
        Ready to train? Plan this week's sessions, manage your exercise library,
        or log your body weight.
      </p>
      <div class="dashboard-links">
        <a class="btn btn-primary" routerLink="/weeks">This Week</a>
        <a class="btn btn-secondary" routerLink="/workouts">Workouts</a>
        <a class="btn btn-secondary" routerLink="/weights">Weight</a>
        <a class="btn btn-secondary" routerLink="/changelog">Changelog</a>
      </div>
    </div>
  </div>
</div>
