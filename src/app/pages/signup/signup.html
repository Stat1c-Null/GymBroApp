<div class="auth-page">
  <!-- Animated Background -->
  <div class="auth-bg">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <!-- Signup Card -->
  <div class="auth-card glass-card">
    <!-- Logo / Branding -->
    <div class="auth-header">
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="18" width="40" height="12" rx="3" fill="url(#grad2)" opacity="0.9"/>
          <rect x="10" y="12" width="6" height="24" rx="3" fill="url(#grad2)"/>
          <rect x="32" y="12" width="6" height="24" rx="3" fill="url(#grad2)"/>
          <rect x="1" y="16" width="6" height="16" rx="3" fill="url(#grad2)" opacity="0.7"/>
          <rect x="41" y="16" width="6" height="16" rx="3" fill="url(#grad2)" opacity="0.7"/>
          <defs>
            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:hsl(270, 80%, 55%)"/>
              <stop offset="100%" style="stop-color:hsl(290, 70%, 50%)"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Start tracking your fitness journey</p>
    </div>

    <!-- Error Message -->
    @if (errorMessage()) {
      <div class="auth-error" id="signup-error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
        </svg>
        {{ errorMessage() }}
      </div>
    }

    <!-- Sign Up Form -->
    <form (ngSubmit)="onSignUp()" class="auth-form">
      <!-- Display Name -->
      <div class="form-group">
        <label class="form-label" for="signup-name">Display Name</label>
        <input
          class="form-input"
          id="signup-name"
          type="text"
          placeholder="What should we call you?"
          [(ngModel)]="displayName"
          name="displayName"
          autocomplete="name"
          required
        />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="signup-email">Email</label>
        <input
          class="form-input"
          id="signup-email"
          type="email"
          placeholder="you@example.com"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          required
        />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="signup-password">Password</label>
        <div class="password-wrapper">
          <input
            class="form-input"
            id="signup-password"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="At least 6 characters"
            [(ngModel)]="password"
            name="password"
            autocomplete="new-password"
            required
            (input)="onPasswordChange()"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
          >
            @if (showPassword()) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>

        <!-- Password Strength Bar -->
        @if (passwordValue()) {
          <div class="password-strength">
            <div class="bar" [class.weak]="passwordStrength().level >= 1" [class.medium]="passwordStrength().level >= 2" [class.strong]="passwordStrength().level >= 3"></div>
            <div class="bar" [class.medium]="passwordStrength().level >= 2" [class.strong]="passwordStrength().level >= 3"></div>
            <div class="bar" [class.strong]="passwordStrength().level >= 3"></div>
          </div>
          <span class="strength-label" [class]="'strength-' + passwordStrength().level">{{ passwordStrength().label }}</span>
        }
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label" for="signup-confirm">Confirm Password</label>
        <div class="password-wrapper">
          <input
            class="form-input"
            id="signup-confirm"
            [type]="showConfirmPassword() ? 'text' : 'password'"
            placeholder="Repeat your password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            autocomplete="new-password"
            required
          />
          <button
            type="button"
            class="password-toggle"
            (click)="toggleConfirmPasswordVisibility()"
          >
            @if (showConfirmPassword()) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Sign Up Button -->
      <button
        type="submit"
        class="btn btn-primary btn-full"
        id="sign-up-btn"
        [disabled]="isLoading()"
      >
        @if (isLoading()) {
          <span class="spinner"></span>
          Creating account...
        } @else {
          Create Account
        }
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">or continue with</div>

    <!-- Google Sign Up -->
    <button
      class="btn btn-google btn-full"
      id="google-sign-up-btn"
      (click)="onGoogleSignUp()"
      [disabled]="isGoogleLoading()"
    >
      @if (isGoogleLoading()) {
        <span class="spinner"></span>
        Connecting...
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11.96 11.96 0 0 0 0 12c0 1.94.46 3.77 1.28 5.41l3.56-2.77.01-.55z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      }
    </button>

    <!-- Sign In Link -->
    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login" id="go-to-login">Sign In</a>
    </p>
  </div>
</div>

<!-- Toast -->
<div
  class="toast"
  [class.visible]="toastVisible()"
  [class.success]="toastType() === 'success'"
  [class.error]="toastType() === 'error'"
>
  {{ toastMessage() }}
</div>
