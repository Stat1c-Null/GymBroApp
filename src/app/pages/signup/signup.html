<app-auth-layout title="Create Account" subtitle="Start tracking your fitness journey">
  <!-- Error Message -->
  @if (errorMessage()) {
    <div class="auth-error" id="signup-error">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
      </svg>
      {{ errorMessage() }}
    </div>
  }

  <!-- Sign Up Form -->
  <form (ngSubmit)="onSignUp()" class="auth-form">
    <!-- Display Name -->
    <div class="form-group">
      <label class="form-label" for="signup-name">Display Name</label>
      <input
        class="form-input"
        id="signup-name"
        type="text"
        placeholder="What should we call you?"
        [(ngModel)]="displayName"
        name="displayName"
        autocomplete="name"
        required
      />
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="signup-email">Email</label>
      <input
        class="form-input"
        id="signup-email"
        type="email"
        placeholder="you@example.com"
        [(ngModel)]="email"
        name="email"
        autocomplete="email"
        required
      />
    </div>

    <!-- Password -->
    <div class="form-group">
      <app-password-input
        label="Password"
        inputId="signup-password"
        placeholder="At least 6 characters"
        autocomplete="new-password"
        name="password"
        [value]="password()"
        (valueChange)="password.set($event)"
      />

      <!-- Password Strength Bar -->
      @if (password()) {
        <div class="password-strength">
          <div class="bar" [class.weak]="passwordStrength().level >= 1" [class.medium]="passwordStrength().level >= 2" [class.strong]="passwordStrength().level >= 3"></div>
          <div class="bar" [class.medium]="passwordStrength().level >= 2" [class.strong]="passwordStrength().level >= 3"></div>
          <div class="bar" [class.strong]="passwordStrength().level >= 3"></div>
        </div>
        <span class="strength-label" [class]="'strength-' + passwordStrength().level">{{ passwordStrength().label }}</span>
      }
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <app-password-input
        label="Confirm Password"
        inputId="signup-confirm"
        placeholder="Repeat your password"
        autocomplete="new-password"
        name="confirmPassword"
        [(value)]="confirmPassword"
      />
    </div>

    <!-- Sign Up Button -->
    <button
      type="submit"
      class="btn btn-primary btn-full"
      id="sign-up-btn"
      [disabled]="isLoading()"
    >
      @if (isLoading()) {
        <span class="spinner"></span>
        Creating account...
      } @else {
        Create Account
      }
    </button>
  </form>

  <!-- Divider -->
  <div class="divider">or continue with</div>

  <!-- Google Sign Up -->
  <app-google-button [loading]="isGoogleLoading()" (clicked)="onGoogleSignUp()" />

  <!-- Sign In Link -->
  <p class="auth-footer">
    Already have an account?
    <a routerLink="/login" id="go-to-login">Sign In</a>
  </p>
</app-auth-layout>
