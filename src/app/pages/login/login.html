<app-auth-layout title="Welcome Back" subtitle="Sign in to continue your gains">
  <!-- Error Message -->
  @if (errorMessage()) {
    <div class="auth-error" id="login-error">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10" />
        <path d="M12 8v4M12 16h.01" />
      </svg>
      {{ errorMessage() }}
    </div>
  }

  <!-- Sign In Form -->
  <form (ngSubmit)="onSignIn()" class="auth-form">
    <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="login-email">Email</label>
      <input class="form-input" id="login-email" type="email" placeholder="you@example.com" [(ngModel)]="email"
        name="email" autocomplete="email" required />
    </div>

    <!-- Password -->
    <div class="form-group">
      <app-password-input
        label="Password"
        inputId="login-password"
        placeholder="Enter your password"
        autocomplete="current-password"
        name="password"
        [(value)]="password"
      />
    </div>

    <!-- Forgot Password -->
    <div class="forgot-link">
      <button type="button" class="btn-ghost" id="forgot-password-btn" (click)="openResetModal()">
        Forgot password?
      </button>
    </div>

    <!-- Sign In Button -->
    <button type="submit" class="btn btn-primary btn-full" id="sign-in-btn" [disabled]="isLoading()">
      @if (isLoading()) {
        <span class="spinner"></span>
        Signing in...
      } @else {
        Sign In
      }
    </button>
  </form>

  <!-- Divider -->
  <div class="divider">or continue with</div>

  <!-- Google Sign In -->
  <app-google-button [loading]="isGoogleLoading()" (clicked)="onGoogleSignIn()" />

  <!-- Sign Up Link -->
  <p class="auth-footer">
    Don't have an account?
    <a routerLink="/signup" id="go-to-signup">Sign Up</a>
  </p>
</app-auth-layout>

<!-- Password Reset Modal -->
<div class="modal-overlay" [class.visible]="showResetModal()" (click)="closeResetModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Reset Password</h2>
      <button class="sidebar-close" (click)="closeResetModal()" aria-label="Close modal">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12" />
        </svg>
      </button>
    </div>
    <p class="modal-description">Enter your email and we'll send you a link to reset your password.</p>

    @if (resetMessage()) {
      <div class="auth-success">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
          <path d="M22 4L12 14.01l-3-3" />
        </svg>
        {{ resetMessage() }}
      </div>
    }

    @if (resetError()) {
      <div class="auth-error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 8v4M12 16h.01" />
        </svg>
        {{ resetError() }}
      </div>
    }

    <div class="form-group mt-2">
      <label class="form-label" for="reset-email">Email address</label>
      <input class="form-input" id="reset-email" type="email" placeholder="you@example.com" [(ngModel)]="resetEmail"
        autocomplete="email" />
    </div>

    <button class="btn btn-primary btn-full mt-2" id="send-reset-btn" (click)="onResetPassword()"
      [disabled]="resetLoading()">
      @if (resetLoading()) {
        <span class="spinner"></span>
        Sending...
      } @else {
        Send Reset Link
      }
    </button>
  </div>
</div>
