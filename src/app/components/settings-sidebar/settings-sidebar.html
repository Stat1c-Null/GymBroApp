<!-- Floating Toggle Button -->
<button
  class="settings-toggle"
  id="settings-toggle-btn"
  (click)="toggle()"
  [attr.aria-expanded]="isOpen()"
  aria-label="Toggle settings"
>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
  </svg>
</button>

<!-- Backdrop -->
@if (isOpen()) {
  <div class="sidebar-backdrop" (click)="close()"></div>
}

<!-- Sidebar Panel -->
<aside class="sidebar-panel" [class.open]="isOpen()">
  <div class="sidebar-header">
    <h3>Settings</h3>
    <button class="sidebar-close" (click)="close()" aria-label="Close settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-body">
    <!-- Theme Toggle -->
    <div class="setting-item">
      <div class="setting-label">
        <span class="setting-icon">
          @if (themeService.theme() === 'dark') {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          }
        </span>
        <span>{{ themeService.theme() === 'dark' ? 'Dark Mode' : 'Light Mode' }}</span>
      </div>
      <button
        class="theme-switch"
        id="theme-toggle-btn"
        [class.active]="themeService.theme() === 'light'"
        (click)="themeService.toggleTheme()"
        [attr.aria-label]="'Switch to ' + (themeService.theme() === 'dark' ? 'light' : 'dark') + ' mode'"
      >
        <span class="switch-knob"></span>
      </button>
    </div>
  </div>
</aside>
