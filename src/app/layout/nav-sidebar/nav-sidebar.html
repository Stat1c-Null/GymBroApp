<aside class="nav-sidebar" [class.open]="open()">
  <!-- Header: signed-in user -->
  <div class="nav-header">
    <div class="nav-user">
      <div class="nav-avatar">{{ displayName().charAt(0).toUpperCase() }}</div>
      <span class="nav-username">{{ displayName() }}</span>
    </div>
    <button class="nav-collapse" (click)="close.emit()" aria-label="Collapse menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="nav-links">
    <a routerLink="/dashboard" routerLinkActive="active" (click)="onNavigate()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" />
        <rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" />
      </svg>
      <span>Dashboard</span>
    </a>
    <a routerLink="/weeks" routerLinkActive="active" (click)="onNavigate()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" />
      </svg>
      <span>Weeks</span>
    </a>
    <a routerLink="/workouts" routerLinkActive="active" (click)="onNavigate()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
      </svg>
      <span>Workouts</span>
    </a>
    <a routerLink="/weights" routerLinkActive="active" (click)="onNavigate()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3a4 4 0 0 0-3.8 2.8L3 19a1 1 0 0 0 1 1.3h16a1 1 0 0 0 1-1.3L15.8 5.8A4 4 0 0 0 12 3Z" />
        <circle cx="12" cy="8" r="1.4" />
      </svg>
      <span>Weight</span>
    </a>
    <a routerLink="/analytics" routerLinkActive="active" (click)="onNavigate()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" />
      </svg>
      <span>Analytics</span>
    </a>
  </nav>

  <!-- Footer: theme + sign out -->
  <div class="nav-footer">
    <app-theme-toggle />
    <button class="nav-signout" (click)="onSignOut()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      Sign Out
    </button>
  </div>
</aside>
